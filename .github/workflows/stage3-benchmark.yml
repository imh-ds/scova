name: Stage 3 path benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 15 * *"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: python benchmarks/stage3_path.py
      - uses: actions/upload-artifact@v4
        with:
          name: stage3-path
          path: benchmark_artifacts/stage3_path.json
