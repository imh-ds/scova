name: Stage 5B promotion audit

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 0"

permissions:
  contents: read

concurrency:
  group: stage5b-promotion-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check src tests benchmarks scripts examples
      - run: mypy src/scova
      - run: python -m pytest -q tests/test_anchor.py tests/test_release_tools.py
      - run: >-
          python benchmarks/stage5b_promotion_campaign.py
          --output release/artifacts/stage5b-promotion-evidence.json
      - run: python scripts/check_stage5b_promotion_audit.py
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: stage5b-promotion-audit
          path: |
            release/artifacts/stage5b-promotion-evidence.json
            release/stage5b_promotion_audit.json
          if-no-files-found: error
          retention-days: 180
