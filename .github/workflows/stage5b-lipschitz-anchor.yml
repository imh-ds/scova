name: Stage 5B Lipschitz-anchor validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/stage5b-lipschitz-anchor.yml"
      - "benchmarks/stage5b_campaign.py"
      - "benchmarks/specs/stage5b_lipschitz_anchor.json"
      - "scripts/check_stage5b_release.py"
      - "src/scova/**"
      - "tests/test_anchor.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/stage5b-lipschitz-anchor.yml"
      - "benchmarks/stage5b_campaign.py"
      - "benchmarks/specs/stage5b_lipschitz_anchor.json"
      - "scripts/check_stage5b_release.py"
      - "src/scova/**"
      - "tests/test_anchor.py"

permissions:
  contents: read

concurrency:
  group: stage5b-lipschitz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check src tests benchmarks scripts
      - run: mypy src/scova
      - run: python -m pytest -q tests/test_anchor.py
      - run: >-
          python benchmarks/stage5b_campaign.py
          --output release/artifacts/stage5b-lipschitz-anchor-evidence.json
      - run: python scripts/check_stage5b_release.py
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: stage5b-lipschitz-evidence
          path: release/artifacts/stage5b-lipschitz-anchor-evidence.json
          if-no-files-found: error
          retention-days: 180
