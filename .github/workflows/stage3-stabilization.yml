name: Stage 3 stabilization

on:
  pull_request:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      tier:
        type: choice
        options: [nightly, release, robustness]
        default: nightly

jobs:
  campaign:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Select tier
        id: tier
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "value=pull_request" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "value=nightly" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tier }}" >> "$GITHUB_OUTPUT"
          fi
      - run: >-
          python benchmarks/stage3_campaign.py
          --tier ${{ steps.tier.outputs.value }}
          --seed-set validation
          --shard-index ${{ matrix.shard }}
          --shard-count 8
          --output benchmark_artifacts/stage3-${{ steps.tier.outputs.value }}-${{ matrix.shard }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: stage3-${{ steps.tier.outputs.value }}-${{ matrix.shard }}
          path: benchmark_artifacts/*

  jax-nightly:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python: "3.11"
            jax: "jax==0.4.38"
            label: minimum
          - python: "3.13"
            jax: "jax"
            label: latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e ".[dev]" "${{ matrix.jax }}"
      - run: >-
          python benchmarks/jax_gradient_matrix.py --cases 10000
          --output benchmark_artifacts/jax-${{ matrix.label }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: jax-${{ matrix.label }}
          path: benchmark_artifacts/jax-${{ matrix.label }}.json

  memory-benchmark:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: >-
          python benchmarks/stage3_memory.py
          --output benchmark_artifacts/stage3-memory.json
      - uses: actions/upload-artifact@v4
        with:
          name: stage3-memory
          path: benchmark_artifacts/stage3-memory.json
