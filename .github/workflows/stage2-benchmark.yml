name: Stage 2 benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: python benchmarks/stage2_fwer.py
      - uses: actions/upload-artifact@v4
        with:
          name: stage2-fwer
          path: benchmark_artifacts/stage2_fwer.json
